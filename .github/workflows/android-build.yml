name: Android APK

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf automake build-essential ccache cmake gettext \
            libffi-dev libltdl-dev libncurses5-dev libncursesw5-dev libssl-dev \
            libtool pkg-config python3-pip python3-setuptools python3-venv patch \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user "Cython<3.0" "buildozer==1.6.0"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: yes | buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 14
